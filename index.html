<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polish Palette</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        .active-nav { color: #1d4ed8; border-top: 3px solid #1d4ed8; }
        body { background-color: #f8fafc; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-700">Polish Palette</h1>
        <div id="status-indicator" class="h-2 w-2 rounded-full bg-green-500"></div>
    </header>

    <main id="app" class="p-4 max-w-xl mx-auto">
        
        <section id="view-collection">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">My Collection</h2>
                <button onclick="toggleModal('add-polish-modal')" class="bg-blue-600 text-white px-5 py-2 rounded-full shadow-lg font-bold">+ Add</button>
            </div>
            
            <input type="text" id="search" placeholder="Search brands or colors..." onkeyup="renderCollection()" class="w-full p-3 mb-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none">
            
            <div class="flex gap-2 mb-6 overflow-x-auto hide-scroll pb-2" id="finish-filters">
                <button onclick="filterByFinish('All')" class="whitespace-nowrap px-4 py-1 rounded-full bg-blue-100 text-blue-700 text-sm font-bold border-2 border-blue-200">All</button>
                </div>
            
            <div id="polish-list" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
        </section>

        <section id="view-plates" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">Stamping Plates</h2>
                <button onclick="toggleModal('add-plate-modal')" class="bg-blue-600 text-white px-5 py-2 rounded-full shadow-lg font-bold">+ Add Plate</button>
            </div>
            <div id="plate-list" class="grid grid-cols-1 gap-3"></div>
        </section>

        <section id="view-planner" class="hidden">
            <h2 class="text-xl font-bold text-slate-800 mb-4">Mani Planner</h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm text-center border border-blue-50">
                <div class="text-4xl mb-4">🎨</div>
                <h3 class="font-bold text-lg mb-2 text-slate-700">Need Inspiration?</h3>
                <p class="text-slate-500 text-sm mb-6">Let the app design your next look.</p>
                <button onclick="generateMani()" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-8 py-4 rounded-2xl font-black w-full shadow-xl active:scale-95 transition-transform">GENERATE LOOK</button>
                <div id="generated-result" class="mt-6 p-6 rounded-2xl bg-white border-2 border-dashed border-blue-200 hidden text-left"></div>
            </div>
        </section>

        <section id="view-health" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">Nail Health Log</h2>
                <button onclick="toggleModal('add-health-modal')" class="bg-blue-600 text-white px-5 py-2 rounded-full shadow-lg font-bold">+ Log Event</button>
            </div>
            <div id="health-list" class="space-y-3"></div>
        </section>

        <section id="view-history" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">Mani Gallery</h2>
                <button onclick="toggleModal('add-mani-modal')" class="bg-blue-600 text-white px-5 py-2 rounded-full shadow-lg font-bold">+ Log Mani</button>
            </div>
            <div id="history-list" class="grid grid-cols-1 gap-6"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-100 flex justify-around p-2 shadow-2xl z-30 overflow-x-auto hide-scroll">
        <button onclick="showView('collection')" id="nav-collection" class="flex flex-col items-center p-2 min-w-[70px]">
            <span class="text-[10px] font-black uppercase">Polish</span>
        </button>
        <button onclick="showView('plates')" id="nav-plates" class="flex flex-col items-center p-2 min-w-[70px]">
            <span class="text-[10px] font-black uppercase">Plates</span>
        </button>
        <button onclick="showView('planner')" id="nav-planner" class="flex flex-col items-center p-2 min-w-[70px]">
            <span class="text-[10px] font-black uppercase">Plan</span>
        </button>
        <button onclick="showView('health')" id="nav-health" class="flex flex-col items-center p-2 min-w-[70px]">
            <span class="text-[10px] font-black uppercase">Health</span>
        </button>
        <button onclick="showView('history')" id="nav-history" class="flex flex-col items-center p-2 min-w-[70px]">
            <span class="text-[10px] font-black uppercase">History</span>
        </button>
    </nav>

    <div id="add-polish-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm p-6 rounded-3xl shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-slate-800">New Polish</h3>
            <input type="text" id="p-brand" placeholder="Brand (e.g. Mooncat)" class="w-full p-3 mb-3 border rounded-xl bg-slate-50">
            <input type="text" id="p-name" placeholder="Color Name" class="w-full p-3 mb-3 border rounded-xl bg-slate-50">
            <select id="p-finish" class="w-full p-3 mb-3 border rounded-xl bg-slate-50">
                <option value="Cream">Cream</option>
                <option value="Holo">Holo</option>
                <option value="Shimmer">Shimmer</option>
                <option value="Glitter">Glitter</option>
                <option value="Magnetic">Magnetic</option>
                <option value="Multichrome">Multichrome</option>
                <option value="Matte">Matte</option>
                <option value="Flakie">Flakie</option>
            </select>
            <div class="flex items-center gap-4 mb-2">
                <input type="color" id="p-color" oninput="checkDupes(this.value)" class="w-16 h-12 rounded-lg cursor-pointer border-none p-0 overflow-hidden">
                <span class="text-xs text-slate-400">Pick the closest color match</span>
            </div>
            <p id="dupe-warning" class="text-[11px] text-amber-700 bg-amber-50 p-3 rounded-xl mb-4 hidden border border-amber-100 font-medium"></p>
            <div class="flex gap-3">
                <button onclick="savePolish()" class="bg-blue-600 text-white flex-1 py-3 rounded-xl font-bold">Save to Vault</button>
                <button onclick="toggleModal('add-polish-modal')" class="bg-slate-100 text-slate-600 px-4 py-3 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <div id="add-health-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm p-6 rounded-3xl shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-slate-800">Health Log</h3>
            <select id="h-type" class="w-full p-3 mb-3 border rounded-xl bg-slate-50">
                <option value="Cuticle Oil">Applied Cuticle Oil</option>
                <option value="Strengthener">Nail Strengthener</option>
                <option value="Breakage">Nail Break 😢</option>
                <option value="Growth Check">Length Milestone</option>
                <option value="Trim">Trim/File</option>
            </select>
            <textarea id="h-note" placeholder="Notes (e.g. Broken index finger, used tea bag method)" class="w-full p-3 mb-4 border rounded-xl bg-slate-50 h-24"></textarea>
            <div class="flex gap-3">
                <button onclick="saveHealth()" class="bg-blue-600 text-white flex-1 py-3 rounded-xl font-bold">Log Event</button>
                <button onclick="toggleModal('add-health-modal')" class="bg-slate-100 text-slate-600 px-4 py-3 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <div id="add-plate-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm p-6 rounded-3xl shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-slate-800">Add Plate</h3>
            <input type="text" id="pl-brand" placeholder="Brand (e.g. Maniology)" class="w-full p-3 mb-3 border rounded-xl bg-slate-50">
            <input type="text" id="pl-name" placeholder="Plate Number/Name" class="w-full p-3 mb-3 border rounded-xl bg-slate-50">
            <input type="text" id="pl-theme" placeholder="Themes (e.g. Floral, Halloween)" class="w-full p-3 mb-4 border rounded-xl bg-slate-50">
            <div class="flex gap-3">
                <button onclick="savePlate()" class="bg-blue-600 text-white flex-1 py-3 rounded-xl font-bold">Save Plate</button>
                <button onclick="toggleModal('add-plate-modal')" class="bg-slate-100 text-slate-600 px-4 py-3 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <div id="add-mani-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm p-6 rounded-3xl shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-slate-800">Log Finished Mani</h3>
            <input type="file" id="m-photo" accept="image/*" class="w-full mb-3 text-sm">
            <textarea id="m-note" placeholder="What polishes & plates did you use?" class="w-full p-3 mb-4 border rounded-xl bg-slate-50 h-24"></textarea>
            <div class="flex gap-3">
                <button onclick="saveMani()" class="bg-blue-600 text-white flex-1 py-3 rounded-xl font-bold">Save Mani</button>
                <button onclick="toggleModal('add-mani-modal')" class="bg-slate-100 text-slate-600 px-4 py-3 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Database Init
        const db = new Dexie("PolishMasterDB");
        db.version(2).stores({
            polishes: '++id, brand, name, finish, color',
            history: '++id, date, photo, note',
            health: '++id, date, type, note',
            plates: '++id, brand, name, theme'
        });

        let currentFinishFilter = 'All';

        // Navigation
        function showView(view) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(`nav-${view}`).classList.add('active-nav');
            
            if(view === 'collection') renderCollection();
            if(view === 'plates') renderPlates();
            if(view === 'health') renderHealth();
            if(view === 'history') renderHistory();
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        // --- INVENTORY LOGIC ---
        function filterByFinish(finish) {
            currentFinishFilter = finish;
            renderCollection();
        }

        async function renderCollection() {
            const query = document.getElementById('search').value.toLowerCase();
            const polishes = await db.polishes.toArray();
            
            // Build Finish Filter Chips
            const finishes = ['All', ...new Set(polishes.map(p => p.finish))];
            const filterContainer = document.getElementById('finish-filters');
            filterContainer.innerHTML = finishes.map(f => `
                <button onclick="filterByFinish('${f}')" class="whitespace-nowrap px-4 py-1 rounded-full text-sm font-bold border-2 transition-colors
                    ${currentFinishFilter === f ? 'bg-blue-600 text-white border-blue-600' : 'bg-blue-50 text-blue-700 border-blue-100'}">
                    ${f}
                </button>
            `).join('');

            const list = document.getElementById('polish-list');
            list.innerHTML = '';

            const filtered = polishes.filter(p => {
                const matchesSearch = p.brand.toLowerCase().includes(query) || p.name.toLowerCase().includes(query);
                const matchesFinish = currentFinishFilter === 'All' || p.finish === currentFinishFilter;
                return matchesSearch && matchesFinish;
            });

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-2xl shadow-sm border-t-[6px] relative group";
                card.style.borderTopColor = p.color;
                card.innerHTML = `
                    <p class="font-black text-xs text-slate-800 truncate">${p.brand}</p>
                    <p class="text-[11px] text-slate-500 truncate mb-2">${p.name}</p>
                    <span class="text-[9px] px-2 py-0.5 rounded bg-slate-100 font-bold uppercase text-slate-400">${p.finish}</span>
                    <button onclick="deletePolish(${p.id})" class="absolute top-1 right-1 text-slate-300 hover:text-red-400 p-1">×</button>
                `;
                list.appendChild(card);
            });
        }

        // Dupe Matcher Logic
        function getColorDistance(hex1, hex2) {
            const r1 = parseInt(hex1.slice(1,3), 16), g1 = parseInt(hex1.slice(3,5), 16), b1 = parseInt(hex1.slice(5,7), 16);
            const r2 = parseInt(hex2.slice(1,3), 16), g2 = parseInt(hex2.slice(3,5), 16), b2 = parseInt(hex2.slice(5,7), 16);
            return Math.sqrt(Math.pow(r1-r2,2) + Math.pow(g1-g2,2) + Math.pow(b1-b2,2));
        }

        async function checkDupes(val) {
            const polishes = await db.polishes.toArray();
            const warning = document.getElementById('dupe-warning');
            let dupe = polishes.find(p => getColorDistance(val, p.color) < 35);
            if(dupe) {
                warning.innerHTML = `⚠️ <b>Possible Dupe:</b> Looks like your "${dupe.brand} - ${dupe.name}"!`;
                warning.classList.remove('hidden');
            } else {
                warning.classList.add('hidden');
            }
        }

        async function savePolish() {
            const brand = document.getElementById('p-brand').value;
            const name = document.getElementById('p-name').value;
            const finish = document.getElementById('p-finish').value;
            const color = document.getElementById('p-color').value;
            if(!brand || !name) return;
            await db.polishes.add({ brand, name, finish, color });
            toggleModal('add-polish-modal');
            renderCollection();
        }

        async function deletePolish(id) {
            if(confirm("Remove this polish?")) { await db.polishes.delete(id); renderCollection(); }
        }

        // --- STAMPING PLATES LOGIC ---
        async function savePlate() {
            const brand = document.getElementById('pl-brand').value;
            const name = document.getElementById('pl-name').value;
            const theme = document.getElementById('pl-theme').value;
            await db.plates.add({ brand, name, theme });
            toggleModal('add-plate-modal');
            renderPlates();
        }

        async function renderPlates() {
            const plates = await db.plates.toArray();
            const list = document.getElementById('plate-list');
            list.innerHTML = plates.map(p => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-400 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-slate-800">${p.brand} - ${p.name}</p>
                        <p class="text-xs text-slate-400 uppercase font-black tracking-tighter">${p.theme}</p>
                    </div>
                    <button onclick="deletePlate(${p.id})" class="text-slate-300">×</button>
                </div>
            `).join('');
        }

        async function deletePlate(id) { await db.plates.delete(id); renderPlates(); }

        // --- NAIL HEALTH LOGIC ---
        async function saveHealth() {
            const type = document.getElementById('h-type').value;
            const note = document.getElementById('h-note').value;
            await db.health.add({ date: new Date().toLocaleDateString(), type, note });
            toggleModal('add-health-modal');
            renderHealth();
        }

        async function renderHealth() {
            const logs = await db.health.reverse().toArray();
            const list = document.getElementById('health-list');
            list.innerHTML = logs.map(l => `
                <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-blue-700 font-black text-xs uppercase">${l.type}</span>
                        <span class="text-[10px] text-slate-400">${l.date}</span>
                    </div>
                    <p class="text-sm text-slate-600">${l.note}</p>
                </div>
            `).join('');
        }

        // --- PLANNER LOGIC ---
        async function generateMani() {
            const polishes = await db.polishes.toArray();
            const plates = await db.plates.toArray();
            if(polishes.length < 2) return alert("Add at least 2 polishes first!");

            const artIdeas = [
                { n: "Geometric Tape", d: "Use painters tape to create sharp triangles of [B] over [A]." },
                { n: "Dotted Galaxy", d: "Base of [A], use a toothpick to add tiny dots of [B] and silver." },
                { n: "Mismatched Skittle", d: "Paint each nail a different finish within the same color family." },
                { n: "Cloud Mani", d: "Paint 'bubbly' cloud shapes of [B] at the tips over [A]." },
                { n: "Negative Space", d: "Leave a 'half moon' bare at the cuticle, paint the rest with [A]." },
                { n: "Stamping Layers", d: "Stamp a pattern from [PLATE] using [B] over [A]." }
            ];

            const style = artIdeas[Math.floor(Math.random() * artIdeas.length)];
            const p = polishes.sort(() => 0.5 - Math.random());
            const plate = plates.length > 0 ? plates[Math.floor(Math.random() * plates.length)] : {brand: "Any", name: "Plate"};

            let text = style.d.replace('[A]', `<b style="color:${p[0].color}">${p[0].name}</b>`)
                             .replace('[B]', `<b style="color:${p[1].color}">${p[1].name}</b>`)
                             .replace('[PLATE]', `<b>${plate.brand} ${plate.name}</b>`);

            const res = document.getElementById('generated-result');
            res.classList.remove('hidden');
            res.innerHTML = `
                <h4 class="font-black text-blue-600 uppercase text-xs tracking-widest mb-1">${style.n}</h4>
                <p class="text-slate-700 leading-relaxed">${text}</p>
            `;
        }

        // --- HISTORY LOGIC ---
        async function saveMani() {
            const file = document.getElementById('m-photo').files[0];
            const note = document.getElementById('m-note').value;
            let photo = file ? await new Promise(r => { 
                const reader = new FileReader(); 
                reader.onload = () => r(reader.result); 
                reader.readAsDataURL(file); 
            }) : '';
            
            await db.history.add({ date: new Date().toLocaleDateString(), photo, note });
            toggleModal('add-mani-modal');
            renderHistory();
        }

        async function renderHistory() {
            const logs = await db.history.reverse().toArray();
            const list = document.getElementById('history-list');
            list.innerHTML = logs.map(l => `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100">
                    ${l.photo ? `<img src="${l.photo}" class="w-full h-64 object-cover">` : ''}
                    <div class="p-5">
                        <div class="text-[10px] font-black text-blue-500 uppercase mb-2">${l.date}</div>
                        <p class="text-slate-600 text-sm italic">"${l.note}"</p>
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        showView('collection');
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
    </html>
